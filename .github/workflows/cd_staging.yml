
name: Deploy to staging 
on:
    push:
      branches: [ main ]

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest
    name: Deploying the frontend to staging cluster
    steps:
       - run : |
            echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
            mkdir .ssh
            echo "${{ secrets.KNOWN_HOSTS }}" &> ~/.ssh/known_hosts
            ssh -i ~/ssh_key root@16.170.168.106
            cd bms/ && git pull
            pnpm install
            pnpm run build
            pm2 start fe-server
            pm2 start http-server
            pm2 start ws-server